services:
  postgres:
    image: postgres:16-alpine
    container_name: alpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: alpha-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: alpha-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'Aguardando MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      echo 'Bucket criado (acesso privado - use URLs presigned em producao)';
      "
    restart: "no"

  whatsapp:
    build:
      context: ../whatsapp-service
    container_name: alpha-whatsapp
    restart: unless-stopped
    environment:
      PORT: 3100
      WHATSAPP_SERVICE_TOKEN: ${WHATSAPP_SERVICE_TOKEN:-change-me-whatsapp-token}
      AUTH_DIR: /app/auth_info
      SEND_DELAY_MS: ${WHATSAPP_SEND_DELAY_MS:-800}
    ports:
      - "${WHATSAPP_PORT:-3100}:3100"
    volumes:
      - whatsapp_auth:/app/auth_info

volumes:
  postgres_data:
  minio_data:
  whatsapp_auth:
